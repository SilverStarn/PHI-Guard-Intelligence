<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Buyer value map for PHI Guard Intelligence</title>
  <desc id="desc">A spacious value map showing how PHI Guard Intelligence serves executive, IT, security, privacy, regulatory, and data teams.</desc>
  <rect width="1280" height="760" fill="#ffffff"/>
  <rect x="48" y="44" width="1184" height="672" rx="20" fill="#f8fafc" stroke="#d6dee9"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="92" y="106" font-size="36" font-weight="800" fill="#162033">Who PHI Guard Intelligence Helps</text>
    <text x="92" y="140" font-size="18" fill="#667085">One evidence layer for privacy risk, security operations, data governance, and executive reporting.</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#64748b"/>
    </marker>
  </defs>

  <g stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M640 304V224"/>
    <path d="M480 390H300"/>
    <path d="M480 470H300"/>
    <path d="M800 390h180"/>
    <path d="M800 470h180"/>
    <path d="M640 536v68"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="480" y="304" width="320" height="232" rx="24" fill="#172033"/>
    <circle cx="640" cy="360" r="34" fill="#2dd4bf"/>
    <text x="560" y="426" font-size="28" font-weight="800" fill="#ffffff">PHI Guard</text>
    <text x="542" y="460" font-size="28" font-weight="800" fill="#ffffff">Intelligence</text>
    <text x="536" y="494" font-size="17" fill="#c7d2e3">Find PHI risk, explain impact,</text>
    <text x="560" y="520" font-size="17" fill="#c7d2e3">and drive remediation.</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="17">
    <rect x="510" y="164" width="260" height="86" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="542" y="202" font-weight="800" fill="#334155">Executives</text>
    <text x="542" y="230" fill="#344054">Know the risk story fast</text>

    <rect x="112" y="334" width="188" height="112" rx="15" fill="#eef7ff" stroke="#93c5fd"/>
    <text x="140" y="374" font-weight="800" fill="#175cd3">IT leaders</text>
    <text x="140" y="404" fill="#344054">Map systems</text>
    <text x="140" y="430" fill="#344054">without raw copies</text>

    <rect x="112" y="454" width="188" height="112" rx="15" fill="#fff8e6" stroke="#facc15"/>
    <text x="140" y="494" font-weight="800" fill="#b54708">Security</text>
    <text x="140" y="524" fill="#344054">Prioritize access,</text>
    <text x="140" y="550" fill="#344054">audit, logs, and AI</text>

    <rect x="980" y="334" width="188" height="112" rx="15" fill="#ecfdf3" stroke="#86efac"/>
    <text x="1008" y="374" font-weight="800" fill="#067647">Privacy teams</text>
    <text x="1008" y="404" fill="#344054">Turn findings into</text>
    <text x="1008" y="430" fill="#344054">reviewable evidence</text>

    <rect x="980" y="454" width="188" height="112" rx="15" fill="#fff1f3" stroke="#fda29b"/>
    <text x="1008" y="494" font-weight="800" fill="#b42318">Regulatory</text>
    <text x="1008" y="524" fill="#344054">Show risk analysis,</text>
    <text x="1008" y="550" fill="#344054">controls, and history</text>

    <rect x="510" y="604" width="260" height="100" rx="14" fill="#f0f9ff" stroke="#7dd3fc"/>
    <text x="542" y="642" font-weight="800" fill="#0369a1">Data teams</text>
    <text x="542" y="670" fill="#344054">Keep analytics useful</text>
    <text x="542" y="694" fill="#344054">and safer</text>
  </g>
</svg>
